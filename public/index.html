<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usta Top v2 - Eng yaxshi ustalar shu yerda</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Home Specific Styles */
        .hero {
            padding: 4rem 0;
            text-align: center;
            background: linear-gradient(135deg, var(--primary-light) 0%, #E0E7FF 100%);
            border-radius: var(--radius-xl);
            margin-top: 1rem;
            margin-bottom: 3rem;
        }
        
        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .hero p {
            font-size: 1.1rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 2rem;
        }

        .search-container {
            display: flex;
            gap: 1rem;
            max-width: 800px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 1rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
        }

        @media (max-width: 768px) {
            .search-container { flex-direction: column; }
        }

        .search-input {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-main);
            border-radius: var(--radius-md);
            padding: 0 1rem;
            border: 1px solid var(--border);
        }

        .search-input i {
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .search-input input, .search-input select {
            width: 100%;
            border: none;
            background: transparent;
            padding: 0.8rem;
            outline: none;
            font-family: var(--font-body);
            font-size: 1rem;
        }

        .workers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 3rem;
        }

        .worker-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .worker-header {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .worker-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary-light);
        }

        .worker-info h3 {
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
        }
        
        .worker-info p {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .worker-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .rating {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            color: var(--warning);
            font-weight: 600;
        }
    </style>
</head>
<body>

    <nav class="navbar glass">
        <div class="container">
            <a href="/index.html" class="navbar-brand">
                <i class="ph-fill ph-wrench"></i> Usta Top
            </a>
            <div class="navbar-nav" id="navbar-links">
                <!-- Injected via JS -->
            </div>
        </div>
    </nav>

    <div class="container">
        <section class="hero">
            <h1>O'z ishingizning ustasini toping</h1>
            <p>Uy ishlari, ta'mirlash, tozalash va boshqa xizmatlar uchun ishonchli ustalarni bir zumda toping.</p>
            
            <div class="search-container">
                <div class="search-input">
                    <i class="ph ph-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="Ism yoki manzil bo'yicha qidiruv...">
                </div>
                <div class="search-input">
                    <i class="ph ph-briefcase"></i>
                    <select id="professionFilter">
                        <option value="">Barcha kasblar</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="loadWorkers()">Qidirish</button>
            </div>
        </section>

        <section id="workers-section">
            <h2 style="margin-bottom: 1.5rem; display: flex; justify-content: space-between; align-items: center;">
                Barcha ustalar
                <span id="worker-count" class="badge badge-primary">0 topildi</span>
            </h2>
            <div class="workers-grid" id="workersGrid">
                <!-- Workers injected here -->
            </div>
            <div id="loading" style="text-align: center; padding: 2rem; color: var(--text-muted);">
                <i class="ph ph-spinner ph-spin" style="font-size: 2rem;"></i>
                <p>Yuklanmoqda...</p>
            </div>
        </section>
    </div>

    <script src="/js/main.js"></script>
    <script>
        // Home page logic
        const loadProfessions = async () => {
            try {
                const professions = await fetchAPI('/workers/professions');
                const select = document.getElementById('professionFilter');
                select.innerHTML = '<option value="">Barcha kasblar</option>';
                professions.forEach(p => {
                    select.innerHTML += `<option value="${p}">${p}</option>`;
                });
            } catch (err) {
                console.error(err);
            }
        };

        const loadWorkers = async () => {
            const search = document.getElementById('searchInput').value;
            const profession = document.getElementById('professionFilter').value;
            const grid = document.getElementById('workersGrid');
            const loading = document.getElementById('loading');
            
            grid.innerHTML = '';
            loading.style.display = 'block';

            try {
                let url = '/workers?';
                if (search) url += `search=${encodeURIComponent(search)}&`;
                if (profession) url += `profession=${encodeURIComponent(profession)}`;
                
                const workers = await fetchAPI(url);
                loading.style.display = 'none';
                
                document.getElementById('worker-count').innerText = `${workers.length} topildi`;

                if (workers.length === 0) {
                    grid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">Ustalar topilmadi.</p>';
                    return;
                }

                workers.forEach(w => {
                    grid.innerHTML += `
                        <div class="card worker-card">
                            <div class="worker-header">
                                <img src="${w.imageUrl}" alt="${w.name}" class="worker-img" onerror="this.src='https://ui-avatars.com/api/?name=${encodeURIComponent(w.name)}&background=random'">
                                <div class="worker-info">
                                    <h3>${w.name}</h3>
                                    <p><i class="ph ph-map-pin"></i> ${w.address}</p>
                                </div>
                            </div>
                            <div style="flex-grow: 1;">
                                <span class="badge badge-primary" style="margin-bottom: 0.5rem">${w.profession}</span>
                                <p style="color: var(--text-muted); font-size: 0.9rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                                    ${w.bio || "Ma'lumot kiritilmagan"}
                                </p>
                            </div>
                            <div class="worker-stats">
                                <div class="rating">
                                    <i class="ph-fill ph-star"></i>
                                    <span>${w.avgRating}</span>
                                    <span style="color: var(--text-muted); font-weight: normal;">(${w.reviewCount} izoh)</span>
                                </div>
                                <a href="/worker.html?id=${w.id}" class="btn btn-primary" style="padding: 0.4rem 1rem">Batafsil</a>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                loading.innerHTML = '<p style="color: var(--danger)">Xatolik yuz berdi</p>';
            }
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadProfessions();
            loadWorkers();

            // Add enter key listener for search
            document.getElementById('searchInput').addEventListener('keyup', (e) => {
                if (e.key === 'Enter') loadWorkers();
            });
            document.getElementById('professionFilter').addEventListener('change', loadWorkers);
        });
    </script>
</body>
</html>
